name: Supabase Keepalive

on:
  schedule:
    # Run every 4 hours to ensure frequent activity
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping keepalive endpoint
        env:
          KEEPALIVE_URL: ${{ secrets.KEEPALIVE_URL }}
          KEEPALIVE_SECRET: ${{ secrets.KEEPALIVE_SECRET }}
        run: |
          set -euo pipefail

          EXPECTED_PATH="/api/cron/supabase-keepalive"
          STATUS_MARKER="__HTTP_STATUS__:"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          request() {
            local url="$1"
            curl --show-error --silent \
              -H "Authorization: Bearer $KEEPALIVE_SECRET" \
              -w "\n${STATUS_MARKER}%{http_code}" \
              "$url" || true
          }

          extract_status() {
            local response="$1"
            if [[ "$response" == *"$STATUS_MARKER"* ]]; then
              printf '%s' "${response##*${STATUS_MARKER}}"
            fi
          }

          extract_body() {
            local response="$1"
            if [[ "$response" == *"$STATUS_MARKER"* ]]; then
              printf '%s' "${response%$'\n'${STATUS_MARKER}*}"
            else
              printf '%s' "$response"
            fi
          }

          if [ -z "${KEEPALIVE_URL:-}" ] || [ -z "${KEEPALIVE_SECRET:-}" ]; then
            echo "Missing KEEPALIVE_URL or KEEPALIVE_SECRET repository secret."
            exit 1
          fi

          echo "[$TIMESTAMP] Pinging keepalive endpoint..."
          echo "   URL: $KEEPALIVE_URL"

          response="$(request "$KEEPALIVE_URL")"
          status="$(extract_status "$response")"
          body="$(extract_body "$response")"

          if [ "$status" = "200" ]; then
            echo "Keepalive request succeeded."
            echo "   Response: $body"
            exit 0
          fi

          echo "Configured URL returned HTTP ${status:-unknown}"
          echo "   Response: $body"

          origin="$(printf '%s' "$KEEPALIVE_URL" | sed -E 's#^(https?://[^/]+).*$#\1#')"
          fallback_url="${origin}${EXPECTED_PATH}"

          if [ "$status" = "404" ] && [ "$fallback_url" != "$KEEPALIVE_URL" ]; then
            echo "Trying fallback keepalive URL on same host..."
            echo "   Fallback URL: $fallback_url"

            fallback_response="$(request "$fallback_url")"
            fallback_status="$(extract_status "$fallback_response")"
            fallback_body="$(extract_body "$fallback_response")"

            if [ "$fallback_status" = "200" ]; then
              echo "Fallback keepalive request succeeded."
              echo "   Response: $fallback_body"
              exit 0
            fi

            echo "Fallback URL returned HTTP ${fallback_status:-unknown}"
            echo "   Response: $fallback_body"
          fi

          echo ""
          echo "Keepalive failed."
          echo "   Ensure KEEPALIVE_URL points to ${EXPECTED_PATH}"
          echo "   Ensure KEEPALIVE_SECRET matches server config"
          echo "   Check that the deployed app is running"
          exit 1
