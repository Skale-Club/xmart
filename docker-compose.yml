version: '3.8'

services:
  # Next.js Web Application
  xmarte-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xmarte-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - KEEPALIVE_SECRET=${KEEPALIVE_SECRET}
      - RELAY_SERVER_URL=http://xmarte-relay:9997
    networks:
      - xmarte-network
    depends_on:
      - xmarte-relay
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "com.zimaos.description=XMarte Home Automation Web Interface"
      - "com.zimaos.service=web"

  # RTSP WebSocket Relay Server
  xmarte-relay:
    build:
      context: .
      dockerfile: Dockerfile.relay
    container_name: xmarte-relay
    restart: unless-stopped
    ports:
      - "9997:9997" # HTTP API port
      - "9001-9100:9001-9100" # WebSocket ports for camera streams
    environment:
      - NODE_ENV=production
      - HTTP_PORT=9997
      - WS_PORT_START=9001
      - FFMPEG_PATH=ffmpeg
    networks:
      - xmarte-network
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9997/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "com.zimaos.description=XMarte RTSP Stream Relay Server"
      - "com.zimaos.service=relay"

networks:
  xmarte-network:
    driver: bridge
    name: xmarte-network

# Optional: Persistent volumes (uncomment if needed)
